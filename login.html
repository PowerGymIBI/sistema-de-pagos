<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGym Ibi - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body {
            background-color: #030407;
            background-image: linear-gradient(to top, rgba(14, 56, 186, 0.45) 0%, rgba(3, 4, 7, 1) 75%);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none; }
    </style>
</head>
<body class="relative px-5">
 
    <div class="w-full max-w-[360px] flex flex-col items-center">
 
        <header class="w-full flex flex-col items-center mb-10">
            <img src="logo.png" alt="Logo" class="h-36 w-auto object-contain mb-6 drop-shadow-[0_0_20px_rgba(46,102,255,0.3)]"
                onerror="this.style.display='none'">
            <h1 class="text-[26px] font-black italic tracking-widest uppercase text-white mb-2 text-center">POWER GYM IBI</h1>
            <p class="text-[10px] font-bold tracking-[0.2em] text-[#3b6ee4] uppercase text-center">ACCESO RESTRINGIDO</p>
        </header>
 
        <main class="w-full bg-[#0a1122] border border-[#16274a] rounded-2xl p-6 shadow-2xl">
 
            <div class="mb-5">
                <label class="block text-[10px] font-bold tracking-[0.15em] text-[#c4cad4] uppercase mb-2">NOMBRE DE USUARIO</label>
                <div class="bg-[#050811] border border-[#16274a] rounded-xl flex items-center px-4 py-3 h-[55px] focus-within:border-[#2e66ff] transition-colors">
                    <svg class="w-5 h-5 text-slate-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <input type="text" id="usernameInput" oninput="checkLoginValidity()" placeholder="Ej: msanchez"
                        class="w-full bg-transparent border-none text-sm font-semibold text-white focus:outline-none focus:ring-0 placeholder-slate-600">
                </div>
            </div>
 
            <div class="mb-8">
                <label class="block text-[10px] font-bold tracking-[0.15em] text-[#c4cad4] uppercase mb-2">CONTRASEÑA</label>
                <div class="bg-[#050811] border border-[#16274a] rounded-xl flex items-center px-4 py-3 h-[55px] focus-within:border-[#2e66ff] transition-colors relative">
                    <svg class="w-5 h-5 text-slate-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    <input type="password" id="passwordInput" oninput="checkLoginValidity()" placeholder="••••••••"
                        class="w-full bg-transparent border-none text-sm font-semibold text-white focus:outline-none focus:ring-0 placeholder-slate-600">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 text-slate-500 hover:text-white transition-colors focus:outline-none">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
 
            <button id="loginBtn" disabled type="button" onclick="processLogin()"
                class="w-full bg-[#081021] text-[#3e527a] border border-[#16274a] font-black tracking-widest text-xs uppercase py-[16px] rounded-xl cursor-not-allowed transition-all flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                ENTRAR
            </button>
 
            <p id="errorMessage" class="text-red-500 text-[10px] font-bold text-center mt-4 tracking-wider opacity-0 transition-opacity">Usuario o contraseña incorrectos</p>
        </main>
 
        <p class="text-[10px] text-slate-600 font-medium mt-8 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Entorno seguro y privado
        </p>
    </div>
 
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
 
        const firebaseConfig = {
            apiKey: "AIzaSyDsqb1_9u0MBdNNlN_wb2JwZwV9auHTcpI",
            authDomain: "power-gym-ibi.firebaseapp.com",
            projectId: "power-gym-ibi",
            storageBucket: "power-gym-ibi.firebasestorage.app",
            messagingSenderId: "244271958048",
            appId: "1:244271958048:web:d1e24070b5a28901c1d445"
        };
 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Bandera para evitar que onAuthStateChanged interfiera cuando
        // processLogin ya está gestionando la redirección
        let isRedirecting = false;
 
        // Si ya está logado al cargar la página, redirigir directamente
        onAuthStateChanged(auth, async (user) => {
            if (isRedirecting) return; // ← evita el bucle
            if (user) {
                isRedirecting = true;
                const snap = await getDoc(doc(db, "socios", user.uid));
                if (snap.exists() && snap.data().rol === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
 
        // Exponer función al scope global
        window.processLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const username = document.getElementById('usernameInput').value.trim().toLowerCase();
            const password = document.getElementById('passwordInput').value;
 
            // Mostrar spinner
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> VERIFICANDO...';
            btn.disabled = true;
            errorMsg.style.opacity = '0';
 
            try {
                // Convertir username a email falso
                const email = username + '@powergym.local';
                const cred = await signInWithEmailAndPassword(auth, email, password);

                // Marcar que processLogin ya toma el control (onAuthStateChanged no debe actuar)
                isRedirecting = true;
 
                // Comprobar rol en Firestore
                const snap = await getDoc(doc(db, "socios", cred.user.uid));
                if (snap.exists() && snap.data().rol === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                isRedirecting = false; // resetear si hay error para que el listener siga activo
                console.error(err);
                errorMsg.style.opacity = '1';
                btn.disabled = false;
                btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> ENTRAR';
                btn.className = "w-full bg-gradient-to-r from-[#1b4dee] to-[#2e66ff] text-white font-black tracking-widest text-xs uppercase py-[16px] rounded-xl cursor-pointer transition-all flex items-center justify-center gap-2";
            }
        };
    </script>
 
    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
                pwdInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }
 
        function checkLoginValidity() {
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            document.getElementById('errorMessage').style.opacity = '0';
            if (user.trim() !== '' && pass.trim() !== '') {
                btn.disabled = false;
                btn.className = "w-full bg-gradient-to-r from-[#1b4dee] to-[#2e66ff] hover:from-[#1541d1] hover:to-[#2255e6] text-white font-black tracking-widest text-xs uppercase py-[16px] rounded-xl cursor-pointer shadow-[0_0_20px_rgba(46,102,255,0.3)] transition-all flex items-center justify-center gap-2";
            } else {
                btn.disabled = true;
                btn.className = "w-full bg-[#081021] text-[#3e527a] border border-[#16274a] font-black tracking-widest text-xs uppercase py-[16px] rounded-xl cursor-not-allowed transition-all flex items-center justify-center gap-2";
            }
        }
    </script>
</body>
</html>
