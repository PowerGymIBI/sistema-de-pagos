<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGym Ibi - Pagos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body {
            background-color: #030407;
            background-image: linear-gradient(to top, rgba(14, 56, 186, 0.45) 0%, rgba(3, 4, 7, 1) 75%);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            background-attachment: fixed;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .glow-red  { box-shadow: 0 0 25px rgba(220,38,38,0.15); border-color: rgba(220,38,38,0.5); }
        .glow-green{ box-shadow: 0 0 35px rgba(34,197,94,0.2);  border-color: rgba(34,197,94,0.6); }
    </style>
    <!-- PWA / Icono pantalla de inicio -->
    <link rel="apple-touch-icon" href="logo2.jpg">
    <link rel="icon" type="image/png" href="logo2.jpg">
    <meta name="application-name" content="PowerGym Ibi">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PowerGym Ibi">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030407">
</head>
<body class="relative pb-12 overflow-x-hidden">
 
    <!-- Pantalla de carga -->
    <div id="loadingScreen" class="fixed inset-0 bg-[#030407] flex items-center justify-center z-50">
        <div class="flex flex-col items-center gap-3">
            <svg class="animate-spin h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            <p class="text-slate-500 text-xs tracking-widest uppercase">Cargando...</p>
        </div>
    </div>
 
    <div id="mainContent" class="max-w-[400px] mx-auto px-5 pt-10 flex flex-col items-center" style="display:none!important">
 
        <header class="w-full flex flex-col items-center mb-8">
            <img src="logo.png" alt="Logo" class="h-32 w-auto object-contain mb-5 drop-shadow-[0_0_15px_rgba(46,102,255,0.2)]" onerror="this.style.display='none'">
            <h1 class="text-[22px] font-black italic tracking-widest uppercase text-white mb-3">POWER GYM IBI</h1>
            <p class="text-[9px] font-semibold tracking-[0.3em] text-slate-400 uppercase mb-4">DISCIPLINA &middot; FUERZA &middot; CONSTANCIA</p>
            <div class="flex items-center gap-3 w-full max-w-[280px]">
                <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-[#1c2944]"></div>
                <p class="text-[7px] font-bold tracking-[0.2em] text-[#3b6ee4] uppercase">TU MEJOR VERSIÓN EMPIEZA HOY</p>
                <div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-[#1c2944]"></div>
            </div>
            <!-- Nombre usuario + botón salir -->
            <div class="flex items-center justify-between w-full mt-4">
                <p class="text-[10px] text-slate-500 uppercase tracking-wider">Hola, <span id="userNameDisplay" class="text-blue-400 font-bold"></span></p>
                <button onclick="cerrarSesion()" class="text-[9px] font-bold text-slate-500 hover:text-red-400 uppercase tracking-wider transition">Salir</button>
            </div>
        </header>
 
        <main class="w-full flex flex-col gap-5">
 
            <!-- TARJETA DE ESTADO -->
            <div id="statusCard" class="relative bg-[#06080d] border glow-red rounded-2xl p-6 flex flex-col items-center justify-center text-center transition-all duration-700 overflow-hidden">
                <svg class="absolute left-0 top-1/2 -translate-y-1/2 w-14 h-24 text-red-900/10" fill="currentColor" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                <svg class="absolute right-0 top-1/2 -translate-y-1/2 w-14 h-24 text-red-900/10" fill="currentColor" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                <div id="statusIconBg" class="w-[52px] h-[52px] rounded-full flex items-center justify-center border border-red-500/50 bg-red-900/20 mb-4 shadow-[0_0_15px_rgba(220,38,38,0.3)] z-10 transition-all duration-500">
                    <svg id="statusIcon" style="color:#ef4444;" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>
                <h2 id="statusTitle" class="text-[22px] font-black tracking-wide uppercase mb-1 z-10">
                    <span style="color:#ef4444;" id="statusMonthSpan">PAGO</span> PENDIENTE
                </h2>
                <p id="statusSubtitle" class="text-[11px] text-[#8e95a3] font-medium z-10">Cuota del mes no registrada</p>
            </div>
 
            <!-- FORMULARIO DE PAGO -->
            <div id="paymentSection" class="bg-[#0a1122] border border-[#16274a] rounded-2xl p-5 shadow-2xl transition-opacity duration-500">
 
                <!-- SELECTOR PLAN -->
                <div class="mb-5">
                    <label class="block text-[10px] font-bold tracking-[0.15em] text-[#c4cad4] uppercase mb-3">PLAN DE PAGO</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" id="plan-mensual-btn" onclick="selectPlan('mensual')"
                            class="py-3 rounded-xl border text-[11px] font-black uppercase tracking-widest"
                            style="background:#1b4dee;border-color:#2e66ff;color:#fff;">
                            &#128197; MENSUAL
                        </button>
                        <button type="button" id="plan-trimestral-btn" onclick="selectPlan('trimestral')"
                            class="py-3 rounded-xl border text-[11px] font-black uppercase tracking-widest"
                            style="background:#050811;border-color:#16274a;color:#94a3b8;">
                            &#128230; TRIMESTRAL
                        </button>
                    </div>
                </div>
 
                <div class="mb-5">
                    <label id="amount-label" class="block text-[10px] font-bold tracking-[0.15em] text-[#c4cad4] uppercase mb-3">CANTIDAD A INGRESAR</label>
                    <div class="bg-[#050811] border border-[#16274a] rounded-xl flex items-center px-4 py-3 h-[60px]">
                        <span class="text-[#2e66ff] text-xl font-bold mr-3">€</span>
                        <input type="number" id="amountInput" oninput="checkFormValidity()" placeholder="00.00"
                            class="w-full bg-transparent border-none text-[26px] font-black text-white focus:outline-none focus:ring-0">
                    </div>
                </div>
 
                <button type="button" onclick="setRecommendedAmount()"
                    class="w-full bg-[#08132b] border border-[#172e5c] hover:bg-[#0c1a3b] transition-colors py-[14px] rounded-xl flex items-center justify-center gap-2 text-[10px] font-bold tracking-widest text-[#3b72ff] uppercase mb-6 cursor-pointer">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z" clip-rule="evenodd"/></svg>
                    <span id="tarifa-btn-label">CARGAR TARIFA HABITUAL:</span> <span id="tarifaLabel">40,00€</span>
                </button>
 
                <div class="mb-6">
                    <label class="block text-[10px] font-bold tracking-[0.15em] text-[#c4cad4] uppercase mb-3">MÉTODO UTILIZADO</label>
                    <div class="grid grid-cols-3 gap-2 text-[10px] font-bold tracking-widest uppercase">
                        <button type="button" onclick="selectMethod('Transferencia', this)" class="method-btn bg-[#050811] border border-[#16274a] rounded-xl py-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-all cursor-pointer">
                            <svg class="w-4 h-4 text-[#2e66ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"/></svg>
                            <span>TRANSF.</span>
                        </button>
                        <button type="button" onclick="selectMethod('Efectivo', this)" class="method-btn bg-[#050811] border border-[#16274a] rounded-xl py-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-all cursor-pointer">
                            <svg class="w-4 h-4 text-[#2e66ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                            <span>EFEC.</span>
                        </button>
                        <button type="button" onclick="selectMethod('Bizum', this)" class="method-btn bg-[#050811] border border-[#16274a] rounded-xl py-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-all cursor-pointer">
                            <svg class="w-4 h-4 text-[#2e66ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                            <span>BIZUM</span>
                        </button>
                    </div>
                </div>
 
                <button id="submitBtn" disabled type="button" onclick="processPayment()"
                    class="w-full bg-[#081021] text-[#3e527a] border border-[#16274a] font-black tracking-widest text-xs uppercase py-[18px] rounded-xl cursor-not-allowed transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6h18M3 12h18M3 18h18"/></svg>
                    REALIZAR PAGO
                </button>
            </div>
 
            <!-- HISTORIAL -->
            <div class="mt-2 mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <svg class="w-4 h-4 text-[#2e66ff]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <h3 class="text-[10px] font-bold tracking-[0.15em] text-white uppercase whitespace-nowrap">Historial de registros</h3>
                    <div class="h-[1px] flex-1 bg-[#16274a]"></div>
                </div>
                <div id="historyList" class="flex flex-col gap-2">
                    <p class="text-slate-600 text-xs text-center py-4">Cargando historial...</p>
                </div>
            </div>
 
        </main>
    </div>
 
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
 
        const firebaseConfig = {
            apiKey: "AIzaSyDsqb1_9u0MBdNNlN_wb2JwZwV9auHTcpI",
            authDomain: "power-gym-ibi.firebaseapp.com",
            projectId: "power-gym-ibi",
            storageBucket: "power-gym-ibi.firebasestorage.app",
            messagingSenderId: "244271958048",
            appId: "1:244271958048:web:d1e24070b5a28901c1d445"
        };
 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
 
        const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
        let socioData = null;
        let tarifaSocio = 40;
 
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
 
            // Cargar datos del socio
            const snap = await getDoc(doc(db, "socios", user.uid));
            if (!snap.exists()) { window.location.href = 'login.html'; return; }
            socioData = { uid: user.uid, ...snap.data() };
 
            // Si es admin, redirigir
            if (socioData.rol === 'admin') { window.location.href = 'admin.html'; return; }
 
            tarifaSocio = socioData.tarifa || 40;
            document.getElementById('userNameDisplay').textContent = socioData.nombre || socioData.username;
            document.getElementById('tarifaLabel').textContent = tarifaSocio.toFixed(2).replace('.', ',') + '€';
 
            // Comprobar pago del mes actual
            const ahora = new Date();
            const mesActual = ahora.getMonth();
            const anioActual = ahora.getFullYear();
 
            const pagosRef = collection(db, "pagos");
            const q = query(pagosRef,
                where("socioId", "==", user.uid),
                where("mes", "==", mesActual),
                where("anio", "==", anioActual)
            );
            const pagosSnap = await getDocs(q);
 
            if (!pagosSnap.empty) {
                // Ya pagó este mes — mostrar estado verde
                mostrarPagado(MESES[mesActual].toUpperCase());
            } else {
                // Mostrar nombre del mes en el estado pendiente
                document.getElementById('statusMonthSpan').textContent = MESES[mesActual].toUpperCase();
            }
 
            // Cargar historial
            await cargarHistorial(user.uid);
 
            // Mostrar contenido
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.removeProperty('display');
        });
 
        async function cargarHistorial(uid) {
            const pagosRef = collection(db, "pagos");
            const q = query(pagosRef, where("socioId", "==", uid), orderBy("fecha", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('historyList');
 
            if (snap.empty) {
                list.innerHTML = '<p class="text-slate-600 text-xs text-center py-4">Sin registros anteriores</p>';
                return;
            }
 
            list.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                const fecha = p.fecha?.toDate ? p.fecha.toDate() : new Date();
                const mesNombre = MESES[p.mes] + ' ' + p.anio;
                list.innerHTML += `
                    <div class="flex items-center justify-between text-[11px] bg-[#0a1122] border border-[#16274a] rounded-xl px-5 py-4">
                        <span class="font-black text-slate-400 tracking-wider uppercase">${mesNombre.toUpperCase()}</span>
                        <span class="font-bold text-white text-xs">${parseFloat(p.importe).toFixed(2).replace('.',',')}€</span>
                        <span class="text-[#8e95a3] font-medium">${p.metodoPago}</span>
                    </div>`;
            });
        }
 
        function mostrarPagado(mesNombre) {
            const card = document.getElementById('statusCard');
            const iconBg = document.getElementById('statusIconBg');
            const icon = document.getElementById('statusIcon');
            const title = document.getElementById('statusTitle');
            const subtitle = document.getElementById('statusSubtitle');
            const paymentSection = document.getElementById('paymentSection');
 
            paymentSection.style.display = 'none';
            card.classList.remove('glow-red'); card.classList.add('glow-green', 'py-10');
            document.getElementById('statusMonthSpan').textContent = mesNombre;
            document.getElementById('statusMonthSpan').style.color = '#22c55e';
            title.innerHTML = `<span style="color:#22c55e;">${mesNombre}</span> PAGADO`;
            subtitle.textContent = 'Cuota del mes registrada';
            subtitle.style.color = '#4ade80';
            iconBg.style.borderColor = 'rgba(34,197,94,0.5)';
            iconBg.style.backgroundColor = 'rgba(34,197,94,0.1)';
            iconBg.className = "w-[64px] h-[64px] rounded-full flex items-center justify-center border-2 mb-5 shadow-[0_0_20px_rgba(34,197,94,0.3)] z-10 transition-all duration-500";
            icon.style.color = '#22c55e';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>';
        }
 
        window.processPayment = async function() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> GUARDANDO...';
 
            const importe    = parseFloat(document.getElementById('amountInput').value);
            const plan       = window._selectedPlan || 'mensual';
            const meses      = plan === 'trimestral' ? 3 : 1;
            const importeMes = meses === 3 ? importe / 3 : importe;
            const ahora      = new Date();
            const mesBase    = ahora.getMonth();
            const anioBase   = ahora.getFullYear();
 
            try {
                for (let i = 0; i < meses; i++) {
                    let mes  = mesBase + i;
                    let anio = anioBase;
                    if (mes > 11) { mes -= 12; anio++; }
                    await addDoc(collection(db, "pagos"), {
                        socioId: socioData.uid,
                        nombre: socioData.nombre,
                        mes,
                        anio,
                        importe: importeMes,
                        metodoPago: window._selectedMethod,
                        tipoPago: plan,
                        estado: 'revisar',
                        fecha: serverTimestamp()
                    });
                }
                mostrarPagado(MESES[mesBase].toUpperCase());
                await cargarHistorial(socioData.uid);
            } catch(e) {
                console.error(e);
                alert('Error al guardar el pago. Inténtalo de nuevo.');
                btn.disabled = false;
            }
        };
 
                window.cerrarSesion = async function() {
            await signOut(auth);
            window.location.href = 'login.html';
        };
    </script>
 
    <script>
           window._selectedMethod = '';
        window._selectedPlan   = 'mensual';
 
        window.selectPlan = function(plan) {
            window._selectedPlan = plan;
            const mBtn = document.getElementById('plan-mensual-btn');
            const tBtn = document.getElementById('plan-trimestral-btn');
            const lbl  = document.getElementById('amount-label');
            const tlbl = document.getElementById('tarifa-btn-label');
            if (plan === 'mensual') {
                mBtn.style.cssText = 'background:#1b4dee;border-color:#2e66ff;color:#fff;';
                tBtn.style.cssText = 'background:#050811;border-color:#16274a;color:#94a3b8;';
                lbl.textContent  = 'CANTIDAD A INGRESAR';
                tlbl.textContent = 'CARGAR TARIFA HABITUAL:';
            } else {
                mBtn.style.cssText = 'background:#050811;border-color:#16274a;color:#94a3b8;';
                tBtn.style.cssText = 'background:#1b4dee;border-color:#2e66ff;color:#fff;';
                lbl.textContent  = 'CANTIDAD TRIMESTRAL (3 MESES)';
                tlbl.textContent = 'CARGAR TARIFA TRIMESTRAL:';
            }
            document.getElementById('amountInput').value = '';
            checkFormValidity();
        };
 
        function setRecommendedAmount() {
            const tarifaBase = parseFloat(document.getElementById('tarifaLabel').textContent) || 40;
            document.getElementById('amountInput').value = tarifaBase.toFixed(2);
            checkFormValidity();
        }
 
                function selectMethod(methodName, buttonElement) {
            window._selectedMethod = methodName;
            document.querySelectorAll('.method-btn').forEach(btn => {
                btn.style.borderColor = '#16274a';
                btn.style.backgroundColor = '#050811';
                btn.style.color = '#94a3b8';
            });
            buttonElement.style.borderColor = '#2e66ff';
            buttonElement.style.backgroundColor = '#0c1b40';
            buttonElement.style.color = '#ffffff';
            checkFormValidity();
        }
 
        function checkFormValidity() {
            const amount = parseFloat(document.getElementById('amountInput').value);
            const submitBtn = document.getElementById('submitBtn');
            if (amount > 0 && window._selectedMethod !== '') {
                submitBtn.disabled = false;
                submitBtn.className = "w-full bg-gradient-to-r from-[#1b4dee] to-[#2e66ff] hover:from-[#1541d1] hover:to-[#2255e6] text-white font-black tracking-widest text-xs uppercase py-[18px] rounded-xl cursor-pointer shadow-[0_0_20px_rgba(46,102,255,0.3)] transition-all flex items-center justify-center gap-2";
                submitBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> REALIZAR PAGO';
            } else {
                submitBtn.disabled = true;
                submitBtn.className = "w-full bg-[#081021] text-[#3e527a] border border-[#16274a] font-black tracking-widest text-xs uppercase py-[18px] rounded-xl cursor-not-allowed transition-all flex items-center justify-center gap-2";
                submitBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6h18M3 12h18M3 18h18"/></svg> REALIZAR PAGO';
            }
        }
    </script>
</body>
</html>
